name: summitoeacp
description: "Application vitrine 11ème Sommet des Chefs d’Etat et de Gouvernement de l’OEACP"
publish_to: 'none'
# version: 1.1.1+2 # android
version: 1.0.0+1 # ios

environment:
  # sdk: ^3.11.0
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Assets
  google_fonts: ^8.0.0
  intl: ^0.20.2
  font_awesome_flutter: ^10.6.0
  
  # State Management & Navigation
  provider: ^6.1.1
  go_router: ^17.0.1
  
  # Features
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  qr_flutter: ^4.1.0
  dotted_border: ^2.0.0
  http: ^1.6.0
  flutter_widget_from_html: ^0.17.1
  html: ^0.15.4
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  video_player: ^2.10.1
  lottie: ^3.3.2
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  shared_preferences: ^2.5.4
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_app.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

