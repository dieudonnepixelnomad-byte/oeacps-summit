workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - oeacps
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.summitoacps.oacpssummit"
    scripts:
      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Configure Xcode signing
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set iOS deployment target
        script: |
          find . -name "Podfile" -exec sed -i "s/^# platform :ios, '.*'/platform :ios, '15.0'/" {} \;
          find . -name "Podfile" -exec sed -i "s/^platform :ios, '.*'/platform :ios, '15.0'/" {} \;

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Build iOS app ipa for release
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true